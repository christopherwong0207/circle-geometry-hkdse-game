        const ArrowRightIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="18" height="18"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>;

        const HomeIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="18" height="18"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const TrophyIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="#eab308" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="48" height="48"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>;

        const O = {x: 200, y: 200};
        const R = 150;

        const getPt = (ang_deg) => ({
            x: O.x + R * Math.cos((ang_deg - 90) * Math.PI / 180),
            y: O.y + R * Math.sin((ang_deg - 90) * Math.PI / 180)
        });

        const drawAngleArc = (vertex, pt1, pt2, radius, isReflex = false, arcs = 1) => {
            let start = Math.atan2(pt1.y - vertex.y, pt1.x - vertex.x);
            let end = Math.atan2(pt2.y - vertex.y, pt2.x - vertex.x);
            let diff = end - start;
            while (diff <= -Math.PI) diff += 2 * Math.PI;
            while (diff > Math.PI) diff -= 2 * Math.PI;
            if (diff < 0) {
                let temp = start; start = end; end = temp; diff = -diff;
            }
            let largeArcFlag = isReflex ? 1 : 0;
            let sweepFlag = isReflex ? 0 : 1;

            const getPath = (r) => {
                const startX = vertex.x + r * Math.cos(start);
                const startY = vertex.y + r * Math.sin(start);
                const endX = vertex.x + r * Math.cos(end);
                const endY = vertex.y + r * Math.sin(end);
                return `M ${startX} ${startY} A ${r} ${r} 0 ${largeArcFlag} ${sweepFlag} ${endX} ${endY}`;
            };

            let path = getPath(radius);
            if (arcs > 1) path += " " + getPath(radius + 5);
            if (arcs > 2) path += " " + getPath(radius + 10);
            return path;
        };

        const getAnglePos = (vertex, pt1, pt2, radius, isReflex = false) => {
            let start = Math.atan2(pt1.y - vertex.y, pt1.x - vertex.x);
            let end = Math.atan2(pt2.y - vertex.y, pt2.x - vertex.x);
            let diff = end - start;
            while (diff <= -Math.PI) diff += 2 * Math.PI;
            while (diff > Math.PI) diff -= 2 * Math.PI;
            if (diff < 0) {
                let temp = start; start = end; end = temp; diff = -diff;
            }
            let midAngle = isReflex ? (start + diff / 2 + Math.PI) : (start + diff / 2);
            return { x: vertex.x + radius * Math.cos(midAngle), y: vertex.y + radius * Math.sin(midAngle) };
        };

        const getLabelOffset = (ang_deg, radiusOffset = 25) => ({
            ox: radiusOffset * Math.cos((ang_deg - 90) * Math.PI / 180),
            oy: radiusOffset * Math.sin((ang_deg - 90) * Math.PI / 180)
        });

        const getOOffset = (anglesArr) => {
            let angles = anglesArr.map(a => a % 360).map(a => a < 0 ? a + 360 : a).sort((a,b) => a-b);
            let gaps = [];
            for (let i=0; i<angles.length-1; i++) gaps.push(angles[i+1] - angles[i]);
            gaps.push((angles[0] + 360) - angles[angles.length-1]);

            let maxGapIdx = gaps.indexOf(Math.max(...gaps));
            let bestAng = 0;
            if (maxGapIdx < angles.length - 1) bestAng = (angles[maxGapIdx] + angles[maxGapIdx+1]) / 2;
            else bestAng = (angles[angles.length-1] + angles[0] + 360) / 2;
            return getLabelOffset(bestAng, 22);
        };

        const getTickCoords = (p1, p2) => {
            const midX = (p1.x + p2.x) / 2;
            const midY = (p1.y + p2.y) / 2;
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const len = Math.sqrt(dx*dx + dy*dy);
            const nx = (-dy / len) * 8;
            const ny = (dx / len) * 8;
            return { x1: midX - nx, y1: midY - ny, x2: midX + nx, y2: midY + ny };
        };

        const getDir = (ang_deg) => ({
            x: Math.cos(ang_deg * Math.PI / 180),
            y: Math.sin(ang_deg * Math.PI / 180)
        });

        const getLabelOffsetFromCenter = (p, center, radiusOffset = 25) => {
            const dx = p.x - center.x;
            const dy = p.y - center.y;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            return { ox: (dx / len) * radiusOffset, oy: (dy / len) * radiusOffset };
        };

        const getCircleFrom3Points = (p1, p2, p3) => {
            const d = 2 * (p1.x * (p2.y - p3.y) + p2.x * (p3.y - p1.y) + p3.x * (p1.y - p2.y));
            const ux = ((p1.x * p1.x + p1.y * p1.y) * (p2.y - p3.y) + (p2.x * p2.x + p2.y * p2.y) * (p3.y - p1.y) + (p3.x * p3.x + p3.y * p3.y) * (p1.y - p2.y)) / d;
            const uy = ((p1.x * p1.x + p1.y * p1.y) * (p3.x - p2.x) + (p2.x * p2.x + p2.y * p2.y) * (p1.x - p3.x) + (p3.x * p3.x + p3.y * p3.y) * (p2.x - p1.x)) / d;
            return { x: ux, y: uy, r: Math.sqrt((p1.x - ux) ** 2 + (p1.y - uy) ** 2) };
        };

        const getLineCircleIntersections = (origin, dir, center, radius) => {
            const fx = origin.x - center.x;
            const fy = origin.y - center.y;
            const b = 2 * (fx * dir.x + fy * dir.y);
            const c = fx * fx + fy * fy - radius * radius;
            const disc = Math.max(0, b * b - 4 * c);
            const root = Math.sqrt(disc);
            return [(-b - root) / 2, (-b + root) / 2];
        };

        const i18n = {

        const THEOREMS = ['t_radii', 't_line', 't_point', 't_chord', 't_iso', 't_tri_sum', 't_center', 't_cyclic', 't_semi', 't_segment', 't_ext_tri', 't_straight', 't_adj'];
        const MAX_QUESTIONS = 5;

        function App() {
            const [lang, setLang] = useState('zh');
            const [appState, setAppState] = useState('home');
            const [moduleType, setModuleType] = useState(1);
            const [qIndex, setQIndex] = useState(1);

            const [qData, setQData] = useState(null);
            const [unlocked, setUnlocked] = useState({});
            const [equipped, setEquipped] = useState(null);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState({ type: 'info', text: i18n['zh'].hintStart });

            const t = i18n[lang];
            const getHintStart = (type = qData?.moduleType || moduleType) => type === 6 ? t.hintStartType6 : t.hintStart;

            useEffect(() => {
                if (appState === 'practice' && !selectedAnswer) {
                    setFeedback(prev => ({...prev, text: prev.type === 'info' ? getHintStart() : prev.text}));
                }
            }, [lang, appState, qData]);

            const startPractice = (type) => {
                setModuleType(type);
                setScore(0);
                setQIndex(1);
                setAppState('practice');
                generateQuestion(type);
            };

            const nextQuestion = () => {
                if (qIndex < MAX_QUESTIONS) {
                    setQIndex(prev => prev + 1);
                    generateQuestion(moduleType);
                } else {
                    setAppState('summary');
                }
            };

            const goHome = () => {
                setAppState('home');
                setQData(null);
            };

            const generateQuestion = (type) => {
                if (type === 1) generateType1Question();
                else if (type === 2) generateType2Question();
                else if (type === 3) generateType3Question();
                else if (type === 4) generateType4Question();
                else if (type === 5) generateType5Question();
                else if (type === 6) generateType6Question();
            };

            const generateDistractors = (ans) => {
                let distractors = new Set();
                while (distractors.size < 3) {
                    const formulas = [ans * 2, Math.floor(ans / 2), 180 - ans, 360 - ans, ans + 10, ans - 5, 90 - ans, ans + 15, ans - 12];
                    const dist = formulas[Math.floor(Math.random() * formulas.length)];
                    if (dist !== ans && dist > 0 && dist < 360) distractors.add(dist);
                }
                return [ans, ...Array.from(distractors)].sort(() => Math.random() - 0.5);
            };

            const generateCloseDistractors = (ans) => {
                const candidates = [ans - 6, ans - 4, ans - 3, ans - 2, ans + 2, ans + 3, ans + 4, ans + 6, ans + 8]
                    .filter(v => v > 0 && v < 180 && v !== ans);
                const shuffled = candidates.sort(() => Math.random() - 0.5);
                return [ans, ...shuffled.slice(0, 3)].sort(() => Math.random() - 0.5);
            };

            const resetPracticeState = (typeForHint = moduleType) => {
                setUnlocked({});
                setSelectedAnswer(null);
                setEquipped(null);
                setFeedback({ type: 'info', text: typeForHint === 6 ? t.hintStartType6 : t.hintStart });
            };

            const generateType1Question = () => {
                const x = Math.floor(Math.random() * 30) + 46;
                const angleAOB = 180 - 2 * x;
                const interiorAOC = angleAOB * 2;
                const reflexAOC = 360 - interiorAOC;
                const angleABC = 2 * x;

                const baseRot = Math.random() * 360;
                const dir = Math.random() > 0.5 ? 1 : -1;
                const angleB = baseRot;
                const angleA = baseRot - dir * angleAOB;
                const angleC = baseRot + dir * angleAOB;

                const A = getPt(angleA);
                const B = getPt(angleB);
                const C = getPt(angleC);

                const A_label = getLabelOffset(angleA);
                const B_label = getLabelOffset(angleB);
                const C_label = getLabelOffset(angleC);
                const O_label = getOOffset([angleA, angleB, angleC]);
                const tickAB = getTickCoords(A, B);
                const tickBC = getTickCoords(B, C);

                const subtype = Math.floor(Math.random() * 4) + 1;
                let answer, givenAngles = [], finalTargetId = "";

                if (subtype === 1) {
                    answer = x; givenAngles = ["reflexAOC"]; finalTargetId = "OAB";
                } else if (subtype === 2) {
                    answer = angleABC; givenAngles = ["reflexAOC"]; finalTargetId = "ABC";
                } else if (subtype === 3) {
                    answer = reflexAOC; givenAngles = ["OAB"]; finalTargetId = "reflexAOC";
                } else {
                    answer = x; givenAngles = ["ABC"]; finalTargetId = "OAB";
                }

                const drawConfigs = [
                    { id: 'reflexAOC', val: reflexAOC, v: O, p1: A, p2: C, r: 25, textR: 50, isReflex: true, arcs: 1, color: '#ef4444', reqAux: false },
                    { id: 'interiorAOC', val: interiorAOC, v: O, p1: C, p2: A, r: 50, textR: 75, isReflex: false, arcs: 2, color: '#f97316', reqAux: false },
                    { id: 'AOB', val: angleAOB, v: O, p1: B, p2: A, r: 22, textR: 45, isReflex: false, arcs: 1, color: '#10b981', reqAux: true },
                    { id: 'BOC', val: angleAOB, v: O, p1: C, p2: B, r: 22, textR: 45, isReflex: false, arcs: 1, color: '#10b981', reqAux: true },
                    { id: 'OAB', val: x, v: A, p1: O, p2: B, r: 22, textR: 45, isReflex: false, arcs: 1, color: '#0ea5e9', reqAux: false },
                    { id: 'OBA', val: x, v: B, p1: A, p2: O, r: 22, textR: 45, isReflex: false, arcs: 1, color: '#0ea5e9', reqAux: true },

            if (appState === 'summary') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 font-sans">

            }

            if (!qData) return <div className="p-8 text-center">Loading...</div>;

            let baseText = t.baseTextType1;
            if (qData.moduleType === 2) baseText = t.baseTextType2;
            if (qData.moduleType === 3) baseText = t.baseTextType3;
            if (qData.moduleType === 4) baseText = t.baseTextType4;
            if (qData.moduleType === 5) baseText = t.baseTextType5;
            if (qData.moduleType === 6) baseText = t.baseTextType6;

            const moduleTitle = qData.moduleType === 1 ? t.homeType1 :
                qData.moduleType === 2 ? t.homeType2 :
                qData.moduleType === 3 ? t.homeType3 :
                qData.moduleType === 4 ? t.homeType4 :
                qData.moduleType === 5 ? t.homeType5 : t.homeType6;

            return (
                <div className="min-h-screen flex flex-col p-2 md:p-6 font-sans text-slate-800 animate-in fade-in duration-300">

                    <div className="w-full max-w-6xl mx-auto flex justify-between items-center mb-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">

                        <div className="flex items-center gap-6">

                            <div className="text-right border-l border-slate-200 pl-6">
                                <div className="text-xs font-semibold text-slate-500 uppercase">{t.progress}</div>

                            </div>
                        </div>
                    </div>

                    <div className="w-full max-w-6xl mx-auto p-4 md:p-5 bg-white border border-slate-200 rounded-t-xl shadow-sm">
                        <p className="text-lg md:text-xl font-medium">

                            {t.givenStr} <span className="font-semibold">{getGivenText()}</span>，{t.findStr} <span className="font-bold border-b-2 border-blue-400">{getFindText()}</span>。
                        </p>
                    </div>

                    <div className="w-full max-w-6xl mx-auto bg-blue-50 p-3 border-x border-b border-slate-200 shadow-sm flex flex-wrap gap-2 items-center">
                        <span className="text-sm font-bold text-blue-800 mr-2">{t.toolbox}</span>
                        {THEOREMS.map(key => {
                            if (qData.moduleType === 1 && !['t_radii', 't_point', 't_chord', 't_iso', 't_tri_sum', 't_center', 't_adj'].includes(key)) return null;
                            if (qData.moduleType === 2 && !['t_radii', 't_point', 't_iso', 't_tri_sum', 't_center', 't_adj'].includes(key)) return null;
                            if (qData.moduleType === 3 && !['t_radii', 't_iso', 't_adj'].includes(key)) return null;
                            if (qData.moduleType === 4 && !['t_line', 't_cyclic', 't_semi', 't_segment', 't_adj'].includes(key)) return null;
                            if (qData.moduleType === 5 && !['t_line', 't_semi', 't_segment', 't_adj', 't_cyclic', 't_tri_sum'].includes(key)) return null;
                            if (qData.moduleType === 6 && !['t_segment', 't_iso', 't_tri_sum', 't_ext_tri', 't_straight', 't_adj'].includes(key)) return null;

                            return (
                                <div
                                    key={key} draggable
                                    onDragStart={(e) => handleDragStart(e, key)}
                                    onClick={() => setEquipped(equipped === key ? null : key)}
                                    className={`px-3 py-1.5 rounded-lg border-2 text-sm md:text-base font-bold cursor-grab active:cursor-grabbing transition-all select-none
                                        ${equipped === key
                                            ? 'bg-blue-600 border-blue-700 text-white shadow-md transform scale-105'
                                            : 'bg-white border-blue-200 text-blue-700 hover:border-blue-400 hover:bg-blue-100'}
                                    `}
                                >
                                    {t.theorems[key]}
                                </div>
                            );
                        })}
                    </div>

                    <div className="w-full max-w-6xl mx-auto flex flex-col md:flex-row bg-white border border-t-0 border-slate-200 rounded-b-xl shadow-sm overflow-hidden">

                        <div className="flex-1 p-6 flex justify-center items-center relative border-b md:border-b-0 md:border-r border-slate-100 min-h-[450px]">
                            <svg viewBox="0 0 400 400" className="w-full max-w-[400px] h-auto select-none">
                                {qData.moduleType === 6 ? (
                                    <circle cx={qData.circleCenter.x} cy={qData.circleCenter.y} r={qData.circleRadius} fill="none" stroke="#cbd5e1" strokeWidth="2.5" />
                                ) : (
                                    <circle cx={O.x} cy={O.y} r={R} fill="none" stroke="#cbd5e1" strokeWidth="2.5" />
                                )}

                                {qData.moduleType === 1 ? (
                                    <g>
                                        <line x1={O.x} y1={O.y} x2={qData.A.x} y2={qData.A.y} stroke="#64748b" strokeWidth="1.5" />
                                        <line x1={O.x} y1={O.y} x2={qData.C.x} y2={qData.C.y} stroke="#64748b" strokeWidth="1.5" />
                                        <line x1={qData.A.x} y1={qData.A.y} x2={qData.B.x} y2={qData.B.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.B.x} y1={qData.B.y} x2={qData.C.x} y2={qData.C.y} stroke="#0f172a" strokeWidth="2" />
                                        {unlocked.aux_OB && <line x1={O.x} y1={O.y} x2={qData.B.x} y2={qData.B.y} stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="4 4" />}
                                        <g stroke="#0f172a" strokeWidth="2">
                                            <line x1={qData.tickAB.x1} y1={qData.tickAB.y1} x2={qData.tickAB.x2} y2={qData.tickAB.y2} />
                                            <line x1={qData.tickBC.x1} y1={qData.tickBC.y1} x2={qData.tickBC.x2} y2={qData.tickBC.y2} />
                                        </g>
                                    </g>
                                ) : qData.moduleType === 2 ? (
                                    <g>
                                        <line x1={O.x} y1={O.y} x2={qData.B.x} y2={qData.B.y} stroke="#64748b" strokeWidth="1.5" />
                                        <line x1={O.x} y1={O.y} x2={qData.C.x} y2={qData.C.y} stroke="#64748b" strokeWidth="1.5" />
                                        <line x1={qData.A.x} y1={qData.A.y} x2={qData.B.x} y2={qData.B.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.A.x} y1={qData.A.y} x2={qData.C.x} y2={qData.C.y} stroke="#0f172a" strokeWidth="2" />
                                        {unlocked.aux_OA && <line x1={O.x} y1={O.y} x2={qData.A.x} y2={qData.A.y} stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="4 4" />}
                                    </g>
                                ) : qData.moduleType === 3 ? (

                                        <line x1={O.x} y1={O.y} x2={qData.A.x} y2={qData.A.y} stroke="#64748b" strokeWidth="1.5" />
                                        <line x1={O.x} y1={O.y} x2={qData.D.x} y2={qData.D.y} stroke="#64748b" strokeWidth="1.5" />
                                        <line x1={qData.A.x} y1={qData.A.y} x2={qData.B.x} y2={qData.B.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.B.x} y1={qData.B.y} x2={qData.C.x} y2={qData.C.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.C.x} y1={qData.C.y} x2={qData.D.x} y2={qData.D.y} stroke="#0f172a" strokeWidth="2" />
                                        {unlocked.aux_OB && <line x1={O.x} y1={O.y} x2={qData.B.x} y2={qData.B.y} stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="4 4" />}
                                        {unlocked.aux_OC && <line x1={O.x} y1={O.y} x2={qData.C.x} y2={qData.C.y} stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="4 4" />}
                                    </g>
                                ) : qData.moduleType === 4 ? (
                                    <g>
                                        <line x1={qData.A.x} y1={qData.A.y} x2={qData.D.x} y2={qData.D.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.A.x} y1={qData.A.y} x2={qData.C.x} y2={qData.C.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.B.x} y1={qData.B.y} x2={qData.C.x} y2={qData.C.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.C.x} y1={qData.C.y} x2={qData.D.x} y2={qData.D.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.B.x} y1={qData.B.y} x2={qData.E.x} y2={qData.E.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.D.x} y1={qData.D.y} x2={qData.E.x} y2={qData.E.y} stroke="#0f172a" strokeWidth="2" />
                                        {unlocked.aux_AE && <line x1={qData.A.x} y1={qData.A.y} x2={qData.E.x} y2={qData.E.y} stroke="#94a3b8" strokeWidth="2" strokeDasharray="4 4" />}
                                    </g>
                                ) : qData.moduleType === 5 ? (
                                    <g>
                                        <line x1={qData.P.x} y1={qData.P.y} x2={qData.S.x} y2={qData.S.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.P.x} y1={qData.P.y} x2={qData.Q.x} y2={qData.Q.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.Q.x} y1={qData.Q.y} x2={qData.R.x} y2={qData.R.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.R.x} y1={qData.R.y} x2={qData.S.x} y2={qData.S.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.P.x} y1={qData.P.y} x2={qData.R.x} y2={qData.R.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.R.x} y1={qData.R.y} x2={qData.T.x} y2={qData.T.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.S.x} y1={qData.S.y} x2={qData.T.x} y2={qData.T.y} stroke="#0f172a" strokeWidth="2" />
                                        {unlocked.aux_QS && <line x1={qData.Q.x} y1={qData.Q.y} x2={qData.S.x} y2={qData.S.y} stroke="#94a3b8" strokeWidth="2" strokeDasharray="4 4" />}
                                    </g>
                                ) : (
                                    <g>
                                        <line x1={qData.E.x} y1={qData.E.y} x2={qData.A.x} y2={qData.A.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.E.x} y1={qData.E.y} x2={qData.B.x} y2={qData.B.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.A.x} y1={qData.A.y} x2={qData.B.x} y2={qData.B.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.A.x} y1={qData.A.y} x2={qData.C.x} y2={qData.C.y} stroke="#0f172a" strokeWidth="2" />
                                        <line x1={qData.B.x} y1={qData.B.y} x2={qData.D.x} y2={qData.D.y} stroke="#0f172a" strokeWidth="2" />
                                        <g stroke="#0f172a" strokeWidth="2">
                                            <line x1={qData.tickAC.x1} y1={qData.tickAC.y1} x2={qData.tickAC.x2} y2={qData.tickAC.y2} />
                                            <line x1={qData.tickCE.x1} y1={qData.tickCE.y1} x2={qData.tickCE.x2} y2={qData.tickCE.y2} />
                                        </g>
                                    </g>
                                )}

                                {activeTargets.includes('aux_OB') && (
                                    <circle cx={(O.x + qData.B.x)/2} cy={(O.y + qData.B.y)/2} r={24} fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" strokeDasharray="4" strokeWidth="2"
                                        onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); attemptUnlock('aux_OB', e.dataTransfer.getData('theorem')); }}
                                        onClick={() => attemptUnlock('aux_OB', equipped)} className="cursor-pointer transition-all animate-pulse" />
                                )}
                                {activeTargets.includes('aux_OA') && (
                                    <circle cx={(O.x + qData.A.x)/2} cy={(O.y + qData.A.y)/2} r={24} fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" strokeDasharray="4" strokeWidth="2"
                                        onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); attemptUnlock('aux_OA', e.dataTransfer.getData('theorem')); }}
                                        onClick={() => attemptUnlock('aux_OA', equipped)} className="cursor-pointer transition-all animate-pulse" />
                                )}
                                {activeTargets.includes('aux_OC') && (
                                    <circle cx={(O.x + qData.C.x)/2} cy={(O.y + qData.C.y)/2} r={24} fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" strokeDasharray="4" strokeWidth="2"
                                        onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); attemptUnlock('aux_OC', e.dataTransfer.getData('theorem')); }}
                                        onClick={() => attemptUnlock('aux_OC', equipped)} className="cursor-pointer transition-all animate-pulse" />
                                )}
                                {activeTargets.includes('aux_AE') && (
                                    <circle cx={(qData.A.x + qData.E.x)/2} cy={(qData.A.y + qData.E.y)/2} r={24} fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" strokeDasharray="4" strokeWidth="2"
                                        onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); attemptUnlock('aux_AE', e.dataTransfer.getData('theorem')); }}
                                        onClick={() => attemptUnlock('aux_AE', equipped)} className="cursor-pointer transition-all animate-pulse" />
                                )}
                                {activeTargets.includes('aux_QS') && (
                                    <circle cx={(qData.Q.x + qData.S.x)/2} cy={(qData.Q.y + qData.S.y)/2} r={24} fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" strokeDasharray="4" strokeWidth="2"
                                        onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); attemptUnlock('aux_QS', e.dataTransfer.getData('theorem')); }}
                                        onClick={() => attemptUnlock('aux_QS', equipped)} className="cursor-pointer transition-all animate-pulse" />
                                )}

                                {qData.drawConfigs.map(config => {
                                    if (qData.moduleType === 3) {
                                        if (config.reqAuxOB && !unlocked.aux_OB) return null;
                                        if (config.reqAuxOC && !unlocked.aux_OC) return null;
                                    } else if (qData.moduleType === 4) {
                                        if (config.reqAuxAE && !unlocked.aux_AE) return null;
                                    } else if (qData.moduleType === 5) {
                                        if (config.reqAuxQS && !unlocked.aux_QS) return null;
                                    } else {
                                        if (config.reqAux) {
                                            if (moduleType === 1 && !unlocked.aux_OB) return null;
                                            if (moduleType === 2 && !unlocked.aux_OA) return null;
                                        }
                                    }

                                    const isGiven = qData.givenAngles.includes(config.id);
                                    const isUnlocked = unlocked[config.id] || isGiven;
                                    const isSymbolicGiven = qData.symbolicAngles && qData.symbolicAngles.includes(config.id);
                                    const isFinalTargetAngle = qData.finalTargetId === config.id;
                                    const isActiveHitbox = activeTargets.includes(config.id);

                                    const shouldDrawArc = isUnlocked || isSymbolicGiven || isActiveHitbox || isFinalTargetAngle;
                                    if (!shouldDrawArc) return null;

                                    const arcPath = drawAngleArc(config.v, config.p1, config.p2, config.r, config.isReflex, config.arcs);
                                    const textPos = getAnglePos(config.v, config.p1, config.p2, config.textR, config.isReflex);
                                    const hitPos = getAnglePos(config.v, config.p1, config.p2, config.r, config.isReflex);
                                    const labelText = qData.moduleType === 6 && config.symbol && !unlocked.solve_x ? config.symbol : `${config.val}°`;
                                    const isKnownOrSymbolic = isUnlocked || isSymbolicGiven;

                                    return (
                                        <g key={config.id}>
                                            <path d={arcPath} fill="none" stroke={isKnownOrSymbolic ? config.color : (isActiveHitbox ? "#ef4444" : "#cbd5e1")} strokeWidth={isKnownOrSymbolic ? 2 : 2.5} strokeDasharray={isKnownOrSymbolic ? "none" : (isActiveHitbox ? "none" : "3 3")} />
                                            {isKnownOrSymbolic ? (
                                                <text x={textPos.x} y={textPos.y} fill={config.color} fontSize="15" fontWeight="bold" textAnchor="middle" dominantBaseline="middle" stroke="#f8fafc" strokeWidth="4" strokeLinejoin="round" style={{paintOrder: "stroke"}}>{labelText}</text>
                                            ) : (
                                                isFinalTargetAngle && !isActiveHitbox && <text x={textPos.x} y={textPos.y} fill="#94a3b8" fontSize="16" fontWeight="bold" textAnchor="middle" dominantBaseline="middle" stroke="#f8fafc" strokeWidth="4" strokeLinejoin="round" style={{paintOrder: "stroke"}}>?</text>
                                            )}
                                            {isActiveHitbox && (
                                                <circle cx={hitPos.x} cy={hitPos.y} r={24} fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" strokeDasharray="4" strokeWidth="2"
                                                    onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); attemptUnlock(config.id, e.dataTransfer.getData('theorem')); }}
                                                    onClick={() => attemptUnlock(config.id, equipped)} className="cursor-pointer transition-all animate-pulse"
                                                />
                                            )}
                                        </g>
                                    );
                                })}

                                {(() => {
                                    let pts = [];
                                    if (qData.moduleType === 5) {
                                        pts = [
                                            {p: qData.P, l: 'P', labelData: qData.P_label},
                                            {p: qData.Q, l: 'Q', labelData: qData.Q_label},
                                            {p: qData.R, l: 'R', labelData: qData.R_label},
                                            {p: qData.S, l: 'S', labelData: qData.S_label},
                                            {p: qData.T, l: 'T', labelData: qData.T_label}
                                        ];
                                    } else if (qData.moduleType === 6) {
                                        pts = [
                                            {p: qData.A, l: 'A', labelData: qData.A_label},
                                            {p: qData.B, l: 'B', labelData: qData.B_label},
                                            {p: qData.C, l: 'C', labelData: qData.C_label},
                                            {p: qData.D, l: 'D', labelData: qData.D_label},
                                            {p: qData.E, l: 'E', labelData: qData.E_label}
                                        ];
                                    } else {
                                        pts = [
                                            {p: qData.A, l: 'A', labelData: qData.A_label},
                                            {p: qData.B, l: 'B', labelData: qData.B_label},
                                            {p: qData.C, l: 'C', labelData: qData.C_label}
                                        ];
                                        if (qData.moduleType === 3 || qData.moduleType === 4) {
                                            pts.push({p: qData.D, l: 'D', labelData: qData.D_label});
                                        }
                                        if (qData.moduleType === 1 || qData.moduleType === 2 || qData.moduleType === 3) {
                                            pts.push({p: O, l: 'O', labelData: qData.O_label});
                                        }
                                        if (qData.moduleType === 4) pts.push({p: qData.E, l: 'E', labelData: qData.E_label});
                                    }

                                    return pts.map((pt, i) => (
                                        <g key={i}>
                                            <circle cx={pt.p.x} cy={pt.p.y} r="4" fill="#1e293b" />

                                })()}
                            </svg>
                        </div>

                        <div className="flex-1 p-5 md:p-8 flex flex-col">
                            <div className={`mb-6 p-3 rounded-lg flex items-start gap-2 text-sm font-medium ${
                                feedback.type === 'info' ? 'bg-slate-50 text-slate-600 border border-slate-200' :
                                feedback.type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' :
                                'bg-rose-50 text-rose-700 border border-rose-200'
                            }`}>
                                <div className="mt-0.5">
                                    {feedback.type === 'success' && <CheckIcon />}
                                    {feedback.type === 'error' && <XIcon />}
                                    {feedback.type === 'info' && <AlertIcon />}
                                </div>
                                <p>{feedback.text}</p>
                            </div>

                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">{t.selectAnswer}</h3>
                            <div className="grid grid-cols-1 gap-3">
                                {qData.options.map((opt, i) => {
                                    const isSelected = selectedAnswer === opt;
                                    const isCorrect = opt === qData.answer;
                                    let btnClass = "py-4 px-5 rounded-xl border-2 text-lg font-bold flex justify-between items-center transition-all ";
                                    if (selectedAnswer === null) {
                                        btnClass += "border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700";
                                    } else if (isCorrect) {
                                        btnClass += "border-emerald-500 bg-emerald-50 text-emerald-700";
                                    } else if (isSelected && !isCorrect) {
                                        btnClass += "border-rose-500 bg-rose-50 text-rose-700";
                                    } else {
                                        btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-50";
                                    }

                                    return (
                                        <button key={i} onClick={() => handleOptionClick(opt)} disabled={selectedAnswer !== null} className={btnClass}>
                                            <span>{['A', 'B', 'C', 'D'][i]}. {opt}°</span>
                                            {selectedAnswer !== null && isCorrect && <CheckIcon />}
                                            {isSelected && !isCorrect && <XIcon />}
                                        </button>
                                    );
                                })}
                            </div>

                            {selectedAnswer !== null && (
                                <button onClick={nextQuestion} className="mt-6 w-full py-4 bg-slate-800 hover:bg-blue-600 text-white text-lg font-bold rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
                                    {qIndex < MAX_QUESTIONS ? t.nextBtn : t.finishBtn} <ArrowRightIcon />
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
